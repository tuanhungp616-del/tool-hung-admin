<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING AI SYSTEM - 8 CỔNG GAME V6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0a0a0a; var(--secondary: #FFD700); --secondary: #FFD700; --accent: #DAA520; 
            --robot-glow: #00f2fe; --text-main: #ffffff; 
            --bg-gradient: radial-gradient(circle at center, #2e2400 0%, #000000 100%); 
            --panel-bg: rgba(15, 10, 0, 0.85); --border-color: #B8860B; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg-gradient); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
        header { height: 75px; background: var(--panel-bg); border-bottom: 2px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 20px rgba(255,215,0,0.4); }
        .logo { display: flex; align-items: center; gap: 10px; font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--secondary); text-shadow: 0 0 10px rgba(255,215,0,0.8); }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--secondary); object-fit: cover; box-shadow: 0 0 15px rgba(255,215,0,1); background: #000; }
        .profile-badge { background: linear-gradient(45deg, rgba(218,165,32,0.2), rgba(255,215,0,0.1)); border: 1px solid var(--secondary); color: var(--secondary); padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; text-align: right; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        #auth-wrapper, .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(8px); background: rgba(0,0,0,0.9); }
        .auth-box, .modal-box { background: var(--panel-bg); border: 2px solid var(--secondary); border-radius: 15px; padding: 30px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 0 40px rgba(255,215,0,0.5); text-align: center; }
        #main-dashboard { display: none; grid-template-columns: 1fr; gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto; }
        .panel { background: rgba(10, 5, 0, 0.7); border: 2px solid var(--secondary); border-radius: 15px; padding: 25px; box-shadow: inset 0 0 30px rgba(255,215,0,0.15), 0 0 15px rgba(255,215,0,0.2); }
        .panel-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--secondary); margin-bottom: 20px; text-align: center; border-bottom: 2px dashed var(--secondary); padding-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .cate-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 800; color: var(--accent); margin: 20px 0 10px 0; text-transform: uppercase; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--secondary); padding-left: 10px; }
        .cyber-btn { padding: 12px; border: 2px solid var(--secondary); border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; color: #000; width: 100%; margin-bottom: 10px; background: linear-gradient(180deg, #FFDF00 0%, #DAA520 100%); box-shadow: 0 0 15px rgba(255,215,0,0.4); transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .cyber-btn:hover { box-shadow: 0 0 25px rgba(255,255,0,0.8); transform: scale(1.02); }
        .btn-red { background: transparent; color: var(--secondary); border-color: var(--secondary); box-shadow: none; }
        .btn-red:hover { background: rgba(255,215,0,0.2); color: var(--secondary); }
        .game-banner-btn { width: 100%; height: 100px; border-radius: 12px; border: 2px solid var(--secondary); object-fit: cover; cursor: pointer; margin-bottom: 15px; box-shadow: 0 0 15px rgba(255,215,0,0.3); transition: all 0.3s; display: block; }
        .game-banner-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(255,215,0,0.8); border-color: #fff; }
        .input-box { width: 100%; background: rgba(0,0,0,0.8); border: 2px solid var(--secondary); border-radius: 8px; color: var(--secondary); font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: bold; padding: 15px; text-align: center; margin-bottom: 20px; outline: none; transition: all 0.3s; letter-spacing: 2px; }
        .input-box:focus { box-shadow: 0 0 20px rgba(255,215,0,0.8); background: #000; }
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; }
        .close-game-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: var(--secondary); border: 2px solid var(--secondary); padding: 10px 20px; border-radius: 8px; font-weight: 900; z-index: 2001; font-family: 'Nunito', sans-serif; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        #draggable-robot { position: absolute; top: 50%; left: 5%; z-index: 2005; display: flex; flex-direction: row; align-items: center; transition: transform 0.2s ease; transform-origin: left center; }
        .robo-img { width: 110px; height: 110px; object-fit: cover; border-radius: 50%; border: 3px solid var(--robot-glow); filter: drop-shadow(0 0 25px rgba(0,242,254,0.9)); cursor: grab; z-index: 2; position: relative; margin-right: -25px; background: #000; }
        .robo-dialog { background: rgba(0,0,0,0.95); border: 2px solid var(--secondary); padding: 15px 15px 15px 35px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(255,215,0,0.5); width: 180px; position: relative; z-index: 1; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; font-weight: bold; color: var(--secondary); cursor: pointer; text-shadow: 0 0 10px rgba(255,215,0,0.8); }
        .list-item { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid var(--secondary); margin-bottom: 10px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .stats-box { border-top: 1px dashed var(--secondary); margin-top: 10px; padding-top: 10px; font-size: 12px; font-weight: 900; display: flex; justify-content: space-around; }
        .btn-sz { flex: 1; border: 1px solid var(--secondary); background: transparent; color: var(--secondary); border-radius: 5px; font-size: 12px; padding: 6px; margin: 0 3px; cursor: pointer; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <button class="close-game-btn" onclick="closeGame()"><i class="fas fa-times"></i> THOÁT</button>
        <iframe id="game-frame" src=""></iframe>
        <div id="draggable-robot">
            <img class="robo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png">
            <div class="robo-dialog">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--secondary); margin-bottom: 10px; padding-bottom: 5px;">
                    <span id="robo-mode-title" style="font-size: 14px; font-weight: 900; color: var(--robot-glow); text-shadow: 0 0 8px var(--robot-glow);">AI MAX XỊN</span>
                </div>
                
                <div id="robo-view-auto">
                    <div style="font-size: 12px; font-weight: 800; color: #fff;" id="robo-subtitle">PHIÊN: <span id="robo-phien" style="color: var(--secondary);">...</span></div>
                    <div id="robo-kq" style="font-size: 24px; font-family: 'Playfair Display', serif; font-weight: 900; padding: 5px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5);">SCANNING</div>
                    <div id="robo-tyle" style="color: var(--secondary); font-size: 13px; font-weight: 900; text-shadow: 0 0 8px var(--secondary);">Đang tải dữ liệu...</div>
                    <div class="stats-box" id="robo-thongke" style="display:none;">
                        <div style="color: #ff3333; text-shadow: 0 0 5px #ff3333;"><span id="tk-tai-label">TÀI</span>: <span id="tk-tai">0</span></div>
                        <div style="color: #ffffff; text-shadow: 0 0 5px #ffffff;"><span id="tk-xiu-label">XỈU</span>: <span id="tk-xiu">0</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-box">
            <div class="logo" style="justify-content: center; margin-bottom: 15px; font-size: 2rem;">
                <img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width: 80px; height: 80px;">
            </div>
            <div class="panel-title" style="border:none; margin-bottom: 25px; font-size: 1.8rem;">KING VIP ACCESS</div>
            <input type="text" id="auth-key" class="input-box" placeholder="NHẬP MÃ KEY CỦA VUA...">
            <button class="cyber-btn" onclick="verifyKey()">KÍCH HOẠT QUYỀN NĂNG</button>
            <div id="auth-msg" style="margin-top: 15px; font-weight:bold; color: var(--secondary);"></div>
            <div style="margin-top: 15px; font-size: 12px; color: var(--border-color);">Độc Quyền Khai Thác Bởi Hưng Admin</div>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <div class="logo"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width: 35px; height: 35px;"> HƯNG ADMIN</div>
        <div class="profile-badge">
            <div style="color: #fff;">TRẠNG THÁI: <span style="color: #00ff00;">ĐÃ KÍCH HOẠT</span></div>
            <div>HSD: <span id="header-expire" style="color: var(--secondary);">...</span></div>
        </div>
    </header>

    <div id="main-dashboard">
        <div class="panel">
            <div class="panel-title" style="font-size: 1.8rem;"><i class="fas fa-chess-king"></i> KHO VŨ KHÍ 8 CỔNG</div>
            
            <img src="https://i.postimg.cc/3JzvBWP6/Screenshot-2026-03-14-10-32-55-76-40deb401b9ffe8e1df2f1cc5ba480b12.jpg" 
                 class="game-banner-btn" onclick="openTool('betvip_tx', 'BETVIP - TÀI XỈU', 'https://play.betvip.fit/')">
            <img src="https://i.postimg.cc/vH4nf52J/Screenshot-2026-03-14-10-33-38-24-40deb401b9ffe8e1df2f1cc5ba480b12.jpg" 
                 class="game-banner-btn" onclick="openTool('lc79_tx', 'LC79 - TÀI XỈU', 'https://lc79.bet')">

            <div class="cate-title">🎰 SUNWIN & XOCDIA88</div>
            <div class="grid-2">
                <button class="cyber-btn" onclick="openTool('sunwin_tx', 'SUNWIN TX', 'https://web.sunwin.club/')">SUNWIN TX</button>
                <button class="cyber-btn" onclick="openTool('xocdia88_md5', 'XOCDIA88 MD5', '')">XOCDIA88 MD5</button>
            </div>

            <div class="cate-title">🎲 HITCLUB & BETVIP MD5</div>
            <div class="grid-2">
                <button class="cyber-btn" onclick="openTool('hitclub_md5', 'HITCLUB MD5', '')">HITCLUB MD5</button>
                <button class="cyber-btn" onclick="openTool('betvip_md5', 'BETVIP MD5', 'https://play.betvip.fit/')">BETVIP MD5</button>
            </div>

            <div class="cate-title">🔥 LC79 NÂNG CAO</div>
            <div class="grid-2">
                <button class="cyber-btn" onclick="openTool('lc79_md5', 'LC79 MD5', 'https://lc79.bet')">LC79 MD5</button>
                <button class="cyber-btn btn-red" onclick="openTool('lc79_xd', 'LC79 XÓC ĐĨA', 'https://lc79.bet')"><i class="fas fa-dot-circle"></i> XÓC ĐĨA LC79</button>
            </div>
            
            <button class="cyber-btn" id="btn-admin-panel" style="display:none; margin-top: 30px; background: transparent; border-color: var(--robot-glow); color: var(--robot-glow);" onclick="loadAdminData()">⚙️ QUẢN TRỊ VƯƠNG QUỐC (TẠO KEY)</button>
            <button class="cyber-btn btn-red" style="margin-top: 10px;" onclick="logout()">ĐĂNG XUẤT KEY</button>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="max-width: 500px;">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">×</div>
            <div class="panel-title" style="color:var(--secondary);">XƯỞNG ĐÚC KEY VÀNG</div>
            <div style="background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--secondary);">
                <input type="text" id="custom-key-input" class="input-box" placeholder="Nhập tên Key (Để trống = Tự random)" style="margin-bottom: 15px; font-size: 13px;">
                <select id="key-duration" class="input-box" style="margin-bottom: 10px;">
                    <option value="1H">Gói 1 Giờ</option>
                    <option value="1D">Gói 1 Ngày</option>
                    <option value="3D">Gói 3 Ngày</option>
                    <option value="30D">Gói 1 Tháng</option>
                </select>
                <button class="cyber-btn" onclick="adminCreateKey()"><i class="fas fa-hammer"></i> RÈN KEY MỚI</button>
            </div>
            <h3 style="margin: 15px 0; color: var(--secondary); text-align: left; font-family: 'Playfair Display';">KHO KEY ĐÃ CẤP</h3>
            <div id="admin-keys" style="max-height: 250px; overflow-y: auto; text-align: left;"></div>
        </div>
    </div>
        <script>
        let currentKey = localStorage.getItem("royal_key") || ""; 
        let scanInterval; let phienCu = ""; let activeGame = ""; 
        let isSpamming = false; let isPredicting = false; 

        if(currentKey) { 
            document.getElementById('auth-key').value = currentKey;
            verifyKey(true); 
        }

        async function verifyKey(isAuto = false) {
            if (isSpamming) return;
            isSpamming = true; setTimeout(() => { isSpamming = false; }, 2000);
            let k = document.getElementById('auth-key').value.trim();
            if(!k) { document.getElementById('auth-msg').innerText = "Vui lòng dâng lên Mã Key!"; return; }
            if(!isAuto) { document.getElementById('auth-msg').innerText = "Đang kiểm chứng Hoàng Gia..."; document.getElementById('auth-msg').style.color = "orange"; }
            
            try {
                let res = await fetch('/api/verify_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key: k})});
                let json = await res.json();
                if (json.status === "success") {
                    currentKey = k; localStorage.setItem("royal_key", currentKey); 
                    document.getElementById('auth-wrapper').style.display = 'none'; 
                    document.getElementById('main-header').style.display = 'flex'; 
                    document.getElementById('main-dashboard').style.display = 'grid';
                    document.getElementById('header-expire').innerText = json.expire;
                    document.getElementById('btn-admin-panel').style.display = (json.role === "admin") ? 'block' : 'none';
                } else { 
                    if(!isAuto) { document.getElementById('auth-msg').innerText = json.msg; document.getElementById('auth-msg').style.color = "red"; } 
                    else { localStorage.removeItem("royal_key"); currentKey = ""; }
                }
            } catch(e) {
                if(!isAuto) { document.getElementById('auth-msg').innerText = "Mất kết nối Server Hoàng Gia!"; document.getElementById('auth-msg').style.color = "red"; }
            }
        }

        function logout() { 
            localStorage.removeItem("royal_key"); currentKey = ""; activeGame = ""; clearInterval(scanInterval); isPredicting = false;
            document.getElementById('main-header').style.display = 'none'; 
            document.getElementById('main-dashboard').style.display = 'none'; 
            document.getElementById('auth-wrapper').style.display = 'flex'; 
            document.getElementById('auth-key').value = "";
            document.getElementById('auth-msg').innerText = "Đã thoái vị. Vui lòng nhập Key mới.";
            document.getElementById('auth-msg').style.color = "var(--secondary)";
        }

        function openTool(gameTarget, titleName, url) {
            activeGame = gameTarget; 
            phienCu = ""; clearInterval(scanInterval); isPredicting = false;
            document.getElementById('robo-mode-title').innerText = titleName;
            document.getElementById('game-overlay').style.display = 'block';
            if (url !== '') { document.getElementById('game-frame').src = url; }
            
            // Nếu là xóc đĩa thì đổi Text Label
            if(gameTarget === "lc79_xd") {
                document.getElementById('tk-tai-label').innerText = "CHẴN";
                document.getElementById('tk-xiu-label').innerText = "LẺ";
            } else {
                document.getElementById('tk-tai-label').innerText = "TÀI";
                document.getElementById('tk-xiu-label').innerText = "XỈU";
            }

            document.getElementById('robo-subtitle').innerHTML = 'PHIÊN: <span id="robo-phien">...</span>';
            document.getElementById('robo-kq').innerText = "SCANNING"; document.getElementById('robo-tyle').innerText = "Đang kết nối API..."; document.getElementById('robo-thongke').style.display = 'none';
            getSignalTX(); scanInterval = setInterval(getSignalTX, 2000); 
        }

        function closeGame() { activeGame = ""; document.getElementById('game-overlay').style.display = 'none'; document.getElementById('game-frame').src = ''; clearInterval(scanInterval); isPredicting = false; }

        async function getSignalTX() {
            if (isPredicting) return; 
            try {
                // Gọi API với đúng ID của cổng game
                let res = await fetch(`/api/scan?tool=${activeGame}&key=${currentKey}`); let json = await res.json();
                if(json.status === "error") { 
                    if(json.msg.includes("Chờ cầu mới")) return; 
                    alert(json.msg); clearInterval(scanInterval); closeGame(); 
                    if(json.msg.includes("hết hạn") || json.msg.includes("khóa")) logout();
                    return; 
                }
                let data = json.data;
                if(data.phien !== phienCu) {
                    isPredicting = true;
                    phienCu = data.phien; 
                    document.getElementById('robo-phien').innerText = "#" + data.phien;
                    
                    let el = document.getElementById('robo-kq');
                    let tyleEl = document.getElementById('robo-tyle');
                    
                    el.innerText = "⏳ LOADING..."; 
                    el.style.color = "var(--secondary)";
                    tyleEl.innerText = "Đợi bố chút... đang soi cầu " + activeGame.split("_")[0].toUpperCase() + " xịn!";
                    document.getElementById('robo-thongke').style.display = 'none';

                    setTimeout(() => {
                        el.innerText = data.du_doan; 
                        tyleEl.innerText = "WIN: " + data.ti_le + "%";
                        // Màu đỏ cho TÀI và CHẴN, màu trắng cho XỈU và LẺ
                        el.style.color = (data.du_doan === "TÀI" || data.du_doan === "CHẴN") ? "#ff4d4d" : "#fff";
                        
                        // Render số liệu Tài/Xỉu hoặc Chẵn/Lẻ
                        if(activeGame === "lc79_xd" && data.tong_chan !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_chan; 
                            document.getElementById('tk-xiu').innerText = data.tong_le;
                        } else if(data.tong_tai !== undefined && data.tong_xiu !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_tai; 
                            document.getElementById('tk-xiu').innerText = data.tong_xiu;
                        }
                        isPredicting = false; 
                    }, 5000);
                }
            } catch (e) {}
        }

        async function loadAdminData() { 
            document.getElementById('admin-modal').style.display = 'flex'; 
            let res = await fetch(`/api/admin/list_keys?admin_key=${currentKey}`); 
            let json = await res.json(); 
            if(json.status !== "success") return; 
            
            let htmlKeys = ""; 
            json.keys.forEach(k => { 
                let status = k[2] == 1 ? "<span style='color:red;'>BỊ KHÓA</span>" : "<span style='color:#00ff00;'>HOẠT ĐỘNG</span>";
                let btn = k[2] == 0 
                    ? `<button class="btn-sz" style="border-color:red; color:red;" onclick="actionKey('${k[0]}','ban')">KHÓA</button>` 
                    : `<button class="btn-sz" style="border-color:#00ff00; color:#00ff00;" onclick="actionKey('${k[0]}','unban')">MỞ LẠI</button>`;
                htmlKeys += `
                    <div class="list-item" style="flex-direction:column; align-items:flex-start;">
                        <div style="width:100%; display:flex; justify-content:space-between;">
                            <b style="color:var(--accent); font-size:16px;">${k[0]}</b>
                            ${btn}
                        </div>
                        <div style="font-size:11px; margin-top:5px; color:#aaa;">HSD: ${k[1]}<br>Tình trạng: ${status}</div>
                        <button class="btn-sz" style="width:100%; margin-top:8px; margin-left:0; border-color:var(--secondary);" onclick="actionKey('${k[0]}','delete')">XÓA KEY VÀNG</button>
                    </div>`; 
            }); 
            document.getElementById('admin-keys').innerHTML = htmlKeys || "<i style='color:#888;'>Chưa rèn Key nào.</i>"; 
        }

        async function adminCreateKey() {
            let dur = document.getElementById('key-duration').value;
            let customK = document.getElementById('custom-key-input') ? document.getElementById('custom-key-input').value.trim() : "";
            let res = await fetch('/api/admin/create_key', { 
                method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({admin_key: currentKey, duration: dur, custom_key: customK})
            });
            let json = await res.json();
            if(json.status === "success") {
                prompt("Rèn Key thành công! Copy mã này ném cho khách:", json.new_key);
                if(document.getElementById('custom-key-input')) document.getElementById('custom-key-input').value = ""; 
                loadAdminData();
            } else { alert("Lỗi: " + json.msg); }
        }

        async function actionKey(target, act) { 
            if(act === 'delete' && !confirm("Chắc chắn muốn HỦY DIỆT vĩnh viễn Key này?")) return;
            await fetch('/api/admin/action_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, target_key: target, action: act})}); 
            loadAdminData(); 
        }

        dragElement(document.getElementById("draggable-robot"));
        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0; var img = elmnt.querySelector('.robo-img');
            img.onmousedown = dragMouseDown; img.ontouchstart = dragTouchStart;
            function dragMouseDown(e) { e = e || window.event; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function dragTouchStart(e) { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag; }
            function elementDrag(e) { e = e || window.event; e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function elementTouchDrag(e) { pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }
    </script>
